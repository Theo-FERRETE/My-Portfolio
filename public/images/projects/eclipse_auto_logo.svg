  <polygon points="340,68 422,114 422,206 340,252 258,206 258,114" fill="none" stroke="#e8000d" stroke-width="0.8" stroke-dasharray="4,3" style="fill:none;stroke:rgb(232, 0, 13);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-dasharray:4px, 3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

