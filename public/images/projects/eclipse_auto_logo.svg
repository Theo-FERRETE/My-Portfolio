  <line x1="242" y1="160" x2="195" y2="160" stroke="#e8000d" stroke-width="1.5" opacity="0.9" style="fill:rgb(0, 0, 0);stroke:rgb(232, 0, 13);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.9;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
